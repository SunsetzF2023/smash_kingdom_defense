<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smash Kingdom: Action Defense</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #1e1e1e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }
        
        #game-container {
            width: 95vw;
            height: 95vh;
            max-width: 800px;
            max-height: 900px;
            background: #252526;
            border: 3px solid #1e3c72;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #game {
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 7px;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 
                2px 2px 4px rgba(0, 0, 0, 0.8),
                0 0 20px rgba(255, 255, 255, 0.3);
            z-index: 100;
        }
        
        /* 装饰性边框 */
        #game-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4);
            border-radius: 20px;
            z-index: -1;
            opacity: 0.7;
            animation: borderAnimation 3s ease-in-out infinite;
        }
        
        @keyframes borderAnimation {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }
        
        /* 响应式设计 */
        @media (max-width: 480px) {
            #game-container {
                width: 95vw;
                height: 90vh;
                max-width: 400px;
                max-height: 700px;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="loading" class="loading">Loading...</div>
        <canvas id="game"></canvas>
    </div>
    
    <!-- Matter.js 物理引擎 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <!-- Phaser 3 游戏引擎 -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <!-- 游戏类 -->
    <script src="js/soldiers.js"></script>
    <script src="js/enemies.js"></script>
    <!-- 游戏主逻辑 -->
    <script src="js/game.js"></script>
</body>
</html>
